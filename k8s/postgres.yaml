apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: reservation-postgres-pvc
  namespace: reservation-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reservation-postgres
  namespace: reservation-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reservation-postgres
  template:
    metadata:
      labels:
        app: reservation-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: reservation-postgres-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: reservation-postgres-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: reservation-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U postgres -d reservation_system
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U postgres -d reservation_system
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: reservation-postgres-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: reservation-postgres
  namespace: reservation-system
spec:
  selector:
    app: reservation-postgres
  ports:
    - port: 5432
      targetPort: 5432